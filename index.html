<title>トレーラーハウス AIアシスタント | Park Homes Okinawa</title>

<style>
:root {
  --ocean:#006B8F; --sky:#0099CC; --night:#0A1628; --twilight:#112240;
  --starlight:#CCD6F6; --muted:#8892B0; --card:#172A45; --border:#1E3A5F;
  --glow:rgba(0,153,204,0.15); --coral:#E05C3A; --green:#3fb950;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--night);color:var(--starlight);height:100dvh;display:flex;flex-direction:column;overflow:hidden;}
header{background:var(--twilight);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.logo-mark{width:34px;height:34px;background:linear-gradient(135deg,var(--ocean),var(--sky));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:0 0 14px rgba(0,153,204,0.35);flex-shrink:0;}
.logo-text .main{font-family:'Zen Kaku Gothic New',sans-serif;font-size:14px;font-weight:700;color:#fff;}
.logo-text .sub{font-size:10px;color:var(--muted);}
.header-spacer{flex:1;}
.status-badge{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);}
.dot{width:7px;height:7px;border-radius:50%;background:var(--muted);transition:all 0.3s;}
.dot.ready{background:var(--green);box-shadow:0 0 6px var(--green);}
.dot.thinking{background:var(--sky);box-shadow:0 0 6px var(--sky);animation:pulse 0.8s infinite;}
.dot.error{background:var(--coral);box-shadow:0 0 6px var(--coral);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.clear-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:5px 10px;border-radius:6px;font-size:11px;cursor:pointer;transition:all 0.2s;}
.clear-btn:hover{border-color:var(--coral);color:var(--coral);}
.chat-wrap{flex:1;display:flex;flex-direction:column;max-width:820px;width:100%;margin:0 auto;padding:0 16px;overflow:hidden;}
.messages{flex:1;overflow-y:auto;padding:20px 0 10px;display:flex;flex-direction:column;gap:16px;scroll-behavior:smooth;}
.messages::-webkit-scrollbar{width:4px;}
.messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:18px;padding:40px 20px;text-align:center;animation:fadeUp 0.5s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.welcome-icon{font-size:50px;filter:drop-shadow(0 0 18px rgba(0,153,204,0.5));}
.welcome h1{font-family:'Zen Kaku Gothic New',sans-serif;font-size:21px;font-weight:700;color:#fff;line-height:1.4;}
.welcome p{font-size:13px;color:var(--muted);max-width:400px;line-height:1.8;}
.suggestion-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;max-width:480px;margin-top:6px;}
.sug-btn{background:var(--card);border:1px solid var(--border);color:var(--starlight);padding:10px 13px;border-radius:8px;font-size:12px;font-family:'Noto Sans JP',sans-serif;cursor:pointer;text-align:left;line-height:1.4;transition:all 0.2s;}
.sug-btn:hover{border-color:var(--sky);background:var(--glow);color:#fff;}
.msg-row{display:flex;gap:10px;align-items:flex-start;animation:msgIn 0.2s ease;}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.msg-row.user{flex-direction:row-reverse;}
.avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;margin-top:2px;}
.msg-row.user .avatar{background:linear-gradient(135deg,#2D5016,#4a7a26);}
.msg-row.assistant .avatar{background:linear-gradient(135deg,var(--ocean),var(--sky));box-shadow:0 0 8px rgba(0,153,204,0.3);}
.bubble-wrap{display:flex;flex-direction:column;max-width:76%;}
.bubble{padding:11px 15px;border-radius:13px;font-size:14px;line-height:1.7;word-break:break-word;}
.msg-row.user .bubble{background:var(--card);border:1px solid var(--border);border-radius:13px 4px 13px 13px;}
.msg-row.assistant .bubble{background:var(--twilight);border:1px solid var(--border);border-radius:4px 13px 13px 13px;color:#e2e8f0;}
.source-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:7px;}
.chip{background:rgba(0,153,204,0.1);border:1px solid rgba(0,153,204,0.2);color:var(--sky);padding:2px 8px;border-radius:20px;font-size:10px;}
.msg-time{font-size:10px;color:var(--muted);margin-top:4px;padding:0 3px;}
.msg-row.user .msg-time{text-align:right;}
.bubble p{margin-bottom:8px;}.bubble p:last-child{margin-bottom:0;}
.bubble strong{color:#fff;}
.bubble ul,.bubble ol{padding-left:18px;margin:6px 0;}
.bubble li{margin-bottom:3px;}
.bubble code{background:rgba(0,153,204,0.12);color:#7dd3fc;padding:1px 5px;border-radius:3px;font-size:12px;font-family:monospace;}
.typing-dots{display:flex;gap:4px;align-items:center;padding:4px 0;}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:var(--sky);opacity:0.4;animation:db 1.2s infinite;}
.typing-dots span:nth-child(2){animation-delay:0.2s;}.typing-dots span:nth-child(3){animation-delay:0.4s;}
@keyframes db{0%,60%,100%{transform:translateY(0);opacity:0.4}30%{transform:translateY(-5px);opacity:1}}
.stream-cursor::after{content:"▋";color:var(--sky);animation:blink 0.7s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.input-area{padding:10px 0 14px;flex-shrink:0;}
.input-box{display:flex;align-items:flex-end;gap:8px;background:var(--twilight);border:1px solid var(--border);border-radius:12px;padding:7px 9px;transition:border-color 0.2s,box-shadow 0.2s;}
.input-box:focus-within{border-color:var(--sky);box-shadow:0 0 0 3px var(--glow);}
.msg-ta{flex:1;background:none;border:none;color:var(--starlight);font-size:14px;font-family:'Noto Sans JP',sans-serif;line-height:1.5;resize:none;outline:none;min-height:24px;max-height:140px;padding:3px 0;}
.msg-ta::placeholder{color:var(--muted);}
.send-btn{width:35px;height:35px;background:linear-gradient(135deg,var(--ocean),var(--sky));border:none;border-radius:9px;color:#fff;font-size:15px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.2s;align-self:flex-end;}
.send-btn:hover:not(:disabled){transform:scale(1.08);box-shadow:0 0 12px rgba(0,153,204,0.4);}
.send-btn:disabled{background:var(--border);cursor:not-allowed;transform:none;}
.stop-btn{padding:5px 13px;height:35px;background:var(--coral);border:none;border-radius:9px;color:#fff;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0;align-self:flex-end;transition:background 0.2s;}
.stop-btn:hover{background:#c0392b;}
.input-hint{font-size:10px;color:var(--muted);margin-top:5px;padding:0 3px;text-align:right;}
.toast-wrap{position:fixed;bottom:70px;right:16px;z-index:200;display:flex;flex-direction:column;gap:6px;}
.toast{background:var(--card);border:1px solid var(--border);color:var(--starlight);padding:8px 14px;border-radius:8px;font-size:12px;animation:toastIn 0.2s ease;box-shadow:0 4px 20px rgba(0,0,0,0.4);}
.toast.ok{border-color:var(--green);}.toast.err{border-color:var(--coral);}
@keyframes toastIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:none}}
.top-btn{
  position:fixed;bottom:80px;right:16px;z-index:150;
  width:38px;height:38px;
  background:var(--twilight);
  border:1px solid var(--border);
  color:var(--sky);font-size:16px;font-weight:700;
  border-radius:50%;cursor:pointer;
  display:none;align-items:center;justify-content:center;
  transition:all 0.2s;
  box-shadow:0 2px 12px rgba(0,0,0,0.3);
}
.top-btn.show{display:flex;}
.top-btn:hover{background:var(--glow);border-color:var(--sky);transform:translateY(-2px);}
@media(max-width:600px){.top-btn{bottom:72px;right:12px;width:34px;height:34px;font-size:14px;}}
@media(max-width:600px){
  header{padding:0 12px;height:52px;}
  .logo-mark{width:30px;height:30px;font-size:15px;}
  .logo-text .main{font-size:13px;}
  .logo-text .sub{font-size:9px;}
  .clear-btn{padding:4px 8px;font-size:10px;}
  .status-badge span{display:none;}
  .chat-wrap{padding:0 10px;}
  .welcome{gap:14px;padding:24px 12px;}
  .welcome-icon{font-size:40px;}
  .welcome h1{font-size:17px;}
  .welcome p{font-size:12px;}
  .suggestion-grid{grid-template-columns:1fr;gap:6px;max-width:100%;}
  .sug-btn{padding:12px 14px;font-size:13px;}
  .bubble-wrap{max-width:90%;}
  .bubble{font-size:13px;padding:10px 13px;}
  .avatar{width:26px;height:26px;font-size:12px;}
  .msg-ta{font-size:16px;}/* iOSズーム防止 */
  .send-btn{width:32px;height:32px;font-size:14px;}
  .stop-btn{padding:4px 10px;height:32px;font-size:11px;}
}
/* タブレット */
@media(min-width:601px) and (max-width:900px){
  .chat-wrap{max-width:100%;padding:0 20px;}
  .bubble-wrap{max-width:82%;}
  .welcome h1{font-size:19px;}
}
/* 大画面PC */
@media(min-width:1200px){
  .chat-wrap{max-width:960px;}
  .bubble{font-size:15px;}
  .msg-ta{font-size:15px;}
}
</style>

<header>

  <div class="logo-text">
    <div class="main">Park Homes AIアシスタント</div>

<div class="chat-wrap">

      <div class="welcome-icon">🌊</div>

<button class="top-btn" id="topBtn" onclick="scrollToTop()" title="トップに戻る">↑</button>

<script>
const MODEL = "claude-sonnet-4-20250514";
let kb=[], history=[], streaming=false, abort=null;

window.addEventListener('DOMContentLoaded', async () => {
  setStatus('thinking','KB読み込み中...');
  await loadKB();
});

async function loadKB() {
  try {
    const res = await fetch('./qa_data.json');
    if (!res.ok) throw new Error();
    kb = await res.json();
    setStatus('ready', `準備完了 · ${kb.length}問`);
  } catch(e) {
    kb = sampleData();
    setStatus('ready', `準備完了 · ${kb.length}問（サンプル）`);
  }
}

function searchKB(query, topK=8) {
  const qt  = tokenize(query);
  const qbg = bigrams(query);
  const ql  = query.length;

  const scored = kb.map(item => {
    const qTokens = tokenize(item.question);
    const aTokens = tokenize(item.answer||'');
    const ibg     = bigrams(item.question);
    let score = 0;

    // ① 完全一致ボーナス（質問そのもの）
    if (item.question === query) score += 20;

    // ② バイグラムマッチ（フレーズの連続性）
    for (const bg of qbg)
      if (ibg.includes(bg)) score += 3;

    // ③ トークンマッチ（質問側に重み×2、回答側×1）
    for (const q of qt) {
      for (const t of qTokens)
        score += t===q ? 4 : (t.includes(q)||q.includes(t)) ? 2 : 0;
      for (const t of aTokens)
        score += t===q ? 2 : (t.includes(q)||q.includes(t)) ? 1 : 0;
    }

    // ④ カテゴリキーワードボーナス
    const cat = item.category||'';
    if ((query.includes('税') || query.includes('費用') || query.includes('価格')) && cat.includes('税')) score += 2;
    if ((query.includes('法') || query.includes('許可') || query.includes('申請')) && cat.includes('法')) score += 2;
    if ((query.includes('設置') || query.includes('工事') || query.includes('土地')) && cat.includes('設置')) score += 2;
    if ((query.includes('台風') || query.includes('沖縄') || query.includes('離島')) && cat.includes('沖縄')) score += 3;
    if ((query.includes('台風') || query.includes('災害') || query.includes('安全')) && cat.includes('災害')) score += 2;

    // ⑤ 短い質問への長さペナルティ軽減
    const lenBonus = Math.min(ql / 10, 1.5);
    score *= lenBonus;

    return {...item, score};
  }).filter(i => i.score > 0)
    .sort((a,b) => b.score - a.score);

  // ⑥ 重複回答の排除（同じanswerは1件だけ）
  const seen = new Set();
  const deduped = [];
  for (const item of scored) {
    const key = (item.answer||'').slice(0, 40);
    if (!seen.has(key)) {
      seen.add(key);
      deduped.push(item);
    }
    if (deduped.length >= topK) break;
  }
  return deduped;
}

function tokenize(text) {
  return (text||'')
    .replace(/[？！。、「」・…『』【】\(\)（）]/g,' ')
    .split(/\s+/)
    .filter(t => t.length >= 2);
}

function bigrams(text) {
  const clean = (text||'').replace(/\s+/g,'');
  const result = [];
  for (let i=0; i<clean.length-1; i++)
    result.push(clean.slice(i,i+2));
  return result;
}

async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text  = input.value.trim();
  if (!text || streaming) return;
  const w = document.getElementById('welcome');
  if (w) w.style.display='none';
  input.value=''; input.style.height='auto';
  appendMsg('user', text);
  history.push({role:'user', content:text});
  const hits = searchKB(text);
  const {bubble, row} = appendMsg('assistant','');
  bubble.innerHTML='<div class="typing-dots"><span></span><span></span><span></span></div>';
  await streamAPI(text, hits, bubble, row);
}

function suggest(btn){ document.getElementById('msgInput').value=btn.textContent; sendMessage(); }

async function streamAPI(userText, hits, bubble, row) {
  streaming=true; abort=new AbortController();
  document.getElementById('sendBtn').disabled=true;
  document.getElementById('stopBtn').style.display='';
  setStatus('thinking','考え中...');

  let ctx='';
  if (hits.length) ctx='\n\n【関連専門知識 - 上位'+hits.length+'件】\n'+
    hits.map((h,i)=>`[${i+1}][${h.category}] Q:${h.question}\n    A:${h.answer}`).join('\n\n');

  const system=`あなたはPark Homes Okinawa（トレーラーハウスメーカー）の専門AIアシスタントです。
沖縄でのトレーラーハウスの購入・設置・活用に関するあらゆる質問に、わかりやすく親切に回答してください。

ルール：
- 法令・税金の断定は避け「〜の可能性があります」「自治体にご確認ください」と補足する
- 沖縄固有の事情（台風・塩害・用途地域）を意識する
- 答えに自信がない場合は「担当者にお問い合わせください」と案内する
- 重要な点は箇条書きを活用する
- 回答の最後に関連する質問を1つ提案する${ctx}`;

  const messages=[...history.slice(0,-1),{role:'user',content:userText}].slice(-10);

  try {
    const res = await fetch('https://aisdr-proxy.hdxrope.workers.dev/',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:MODEL,max_tokens:1024,system,messages}),
      signal:abort.signal,
    });
    if (!res.ok){const e=await res.json().catch(()=>({})); throw new Error(e?.error?.message||`HTTP ${res.status}`);}
    const data=await res.json();
    const full=data.content?.[0]?.text||'（応答なし）';
    bubble.innerHTML=md(full);
    if(hits.length){
      const chips=document.createElement('div'); chips.className='source-chips';
      hits.slice(0,3).forEach(h=>{const c=document.createElement('span');c.className='chip';c.textContent='📚 '+(h.category||'KB');chips.appendChild(c);});
      row.querySelector('.bubble-wrap').appendChild(chips);
    }
    addTime(row);
    history.push({role:'assistant',content:full});
    setStatus('ready',`準備完了 · ${kb.length}問`);
  } catch(e) {
    if(e.name==='AbortError'){bubble.innerHTML=md(bubble.textContent||'（停止しました）');setStatus('ready','停止');}
    else{bubble.innerHTML=`<span style="color:var(--coral)">❌ ${esc(e.message)}</span>`;setStatus('error','エラー');toast(e.message,'err');}
  }
  streaming=false; abort=null;
  document.getElementById('sendBtn').disabled=false;
  document.getElementById('stopBtn').style.display='none';
}

function stopStream(){abort?.abort();}

function appendMsg(role,content){
  const c=document.getElementById('messages');
  const row=document.createElement('div'); row.className=`msg-row ${role}`;
  const av=document.createElement('div'); av.className='avatar'; av.textContent=role==='user'?'👤':'🏠';
  const wrap=document.createElement('div'); wrap.className='bubble-wrap';
  const bubble=document.createElement('div'); bubble.className='bubble';
  if(content) bubble.innerHTML=md(content);
  wrap.appendChild(bubble); row.appendChild(av); row.appendChild(wrap);
  c.appendChild(row); scrollBottom();
  return {bubble,row};
}

function addTime(row){const t=document.createElement('div');t.className='msg-time';t.textContent=new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});row.querySelector('.bubble-wrap').appendChild(t);}

function md(t){
  t=esc(t);
  t=t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  t=t.replace(/\*(.+?)\*/g,'<em>$1</em>');
  t=t.replace(/`([^`]+)`/g,'<code>$1</code>');
  t=t.replace(/^[-・]\s(.+)$/gm,'<li>$1</li>');
  t=t.replace(/(<li>[\s\S]*?<\/li>)+/g,'<ul>$&</ul>');
  t=t.split('\n\n').map(p=>p.trim()?`<p>${p.replace(/\n/g,'<br>')}</p>`:'').join('');
  return t;
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function scrollToTop(){
  document.getElementById('messages').scrollTo({top:0,behavior:'smooth'});
}

// メッセージエリアのスクロールを監視してトップボタン表示
document.getElementById('messages').addEventListener('scroll', function(){
  document.getElementById('topBtn').classList.toggle('show', this.scrollTop > 150);
});
function scrollBottom(){const c=document.getElementById('messages');requestAnimationFrame(()=>{c.scrollTop=c.scrollHeight;});}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,140)+'px';}

function clearChat(){
  if(!confirm('会話をクリアしますか？')) return;
  history=[];
  const c=document.getElementById('messages'); c.innerHTML='';
